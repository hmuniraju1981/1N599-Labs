<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" fill="#030712" rx="8" />
  <!-- Hexagonal border -->
  <path d="M32 4L56 18V46L32 60L8 46V18L32 4Z" stroke="url(#logoGrad1)" stroke-width="1.5" fill="none" opacity="0.8" />
  <!-- Neural network nodes -->
  <circle cx="32" cy="20" r="3" fill="url(#logoGrad1)" filter="url(#glow)" />
  <circle cx="20" cy="34" r="2.5" fill="#06b6d4" opacity="0.8" />
  <circle cx="44" cy="34" r="2.5" fill="#8b5cf6" opacity="0.8" />
  <circle cx="32" cy="46" r="3" fill="url(#logoGrad1)" filter="url(#glow)" />
  <circle cx="26" cy="27" r="1.5" fill="#06b6d4" opacity="0.5" />
  <circle cx="38" cy="27" r="1.5" fill="#8b5cf6" opacity="0.5" />
  <circle cx="26" cy="40" r="1.5" fill="#ec4899" opacity="0.5" />
  <circle cx="38" cy="40" r="1.5" fill="#06b6d4" opacity="0.5" />
  <!-- Neural connections -->
  <line x1="32" y1="20" x2="20" y2="34" stroke="url(#logoGrad2)" stroke-width="0.8" />
  <line x1="32" y1="20" x2="44" y2="34" stroke="url(#logoGrad2)" stroke-width="0.8" />
  <line x1="20" y1="34" x2="32" y2="46" stroke="url(#logoGrad2)" stroke-width="0.8" />
  <line x1="44" y1="34" x2="32" y2="46" stroke="url(#logoGrad2)" stroke-width="0.8" />
  <line x1="32" y1="20" x2="26" y2="27" stroke="url(#logoGrad2)" stroke-width="0.5" opacity="0.6" />
  <line x1="32" y1="20" x2="38" y2="27" stroke="url(#logoGrad2)" stroke-width="0.5" opacity="0.6" />
  <line x1="20" y1="34" x2="26" y2="40" stroke="url(#logoGrad2)" stroke-width="0.5" opacity="0.6" />
  <line x1="44" y1="34" x2="38" y2="40" stroke="url(#logoGrad2)" stroke-width="0.5" opacity="0.6" />
  <line x1="26" y1="27" x2="38" y2="27" stroke="url(#logoGrad2)" stroke-width="0.4" opacity="0.4" />
  <line x1="26" y1="40" x2="38" y2="40" stroke="url(#logoGrad2)" stroke-width="0.4" opacity="0.4" />
  <!-- Central pulse circle -->
  <circle cx="32" cy="33" r="5" fill="none" stroke="url(#logoGrad1)" stroke-width="1" opacity="0.6" />
</svg>
